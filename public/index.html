<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JetKVM Video</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      height: 100%;
      width: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>
  <script type="module" src="jetkvm-video.js"></script>
</body>
</html>
